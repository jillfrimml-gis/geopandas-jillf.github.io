<!doctype html>
<html lang="en">
  <head>
    <title>Banks in Denver</title>
    <link rel="stylesheet" href="css/leaflet.css" />

    <!-- Map container styling -->
    <style>
      #map {
        height: 600px;
        width: 100%;
      }
      body {
        margin: 0;
        padding: 0;
      }
    </style>

    <!-- Make sure you put this AFTER Leaflet's CSS -->
    <script
      src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"
      integrity="sha256-WBkoXOwTeyKclOHuWtc+i2uENFpDZ9YPdf5Hf+D7ewM="
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div style="padding: 20px; background-color: #f4f4f4">
      <h1>Banks in Denver, Colorado</h1>
      <p>
        This map shows bank locations scraped from Google Maps and geocoded
        using OpenStreetMap.
      </p>
    </div>

    <div id="map"></div>

    <!-- Map initialization script will go here -->
    <script>
      // Initialize the map centered on Denver
      var map = L.map("map").setView([39.7392, -104.9903], 11);

    //   // Add OpenStreetMap tiles as the base layer
    //   L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
    //     maxZoom: 19,
    //     attribution: "© OpenStreetMap contributors",
    //   }).addTo(map);

    //   // CartoDB Positron (light)
    //   L.tileLayer(
    //     "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
    //     {
    //       attribution: "© OpenStreetMap, © CartoDB",
    //     },
    //   ).addTo(map);

      // CartoDB Dark Matter (Dark)
      L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
        {
          attribution: "© OpenStreetMap, © CartoDB",
        },
      ).addTo(map);

      L.geoJSON(data, {
        pointToLayer: function (feature, latlng) {
          return L.circleMarker(latlng, {
            radius: 8,
            fillColor: "#ff7800",
            color: "#000",
            weight: 1,
            opacity: 1,
            fillOpacity: 0.8,
          });
        },
        onEachFeature: function (feature, layer) {
          if (feature.properties.bank_name) {
            layer.bindPopup(
              "<strong>" +
                feature.properties.bank_name +
                "</strong><br>" +
                feature.properties.address,
            );
          }
        },
      }).addTo(map);

      // Load and display the GeoJSON data
      fetch("data/banks.geojson")
        .then((response) => response.json())
        .then((data) => {
          L.geoJSON(data, {
            onEachFeature: function (feature, layer) {
              // Add popup with bank name if it exists
              if (feature.properties.bank_name) {
                layer.bindPopup(
                  "<strong>" +
                    feature.properties.bank_name +
                    "</strong><br>" +
                    feature.properties.address,
                );
              }
            },
          }).addTo(map);
        })
        .catch((error) => console.error("Error loading GeoJSON:", error));
    </script>
  </body>
</html>
